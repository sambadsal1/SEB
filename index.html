<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal Asesmen Aman - SDN Sukabumi 2</title>
    <style>
        :root {
            --primary-blue: #00A2E8; 
            --dark-blue: #005f8a;
            --white: #ffffff;
            --danger: #dc3545;
        }
        body, html {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background-color: #f0f8ff; height: 100%; overflow: hidden;
        }
        
        /* MODE GENERATOR */
        #generator-mode {
            max-width: 600px; margin: 40px auto; background: var(--white);
            padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: center; display: block;
        }
        .logo-img { max-width: 100px; margin-bottom: 15px; }
        input[type="url"], input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; margin: 10px 0; border: 2px solid var(--primary-blue);
            border-radius: 6px; box-sizing: border-box; font-size: 16px;
        }
        button {
            background-color: var(--primary-blue); color: var(--white); border: none;
            padding: 14px 20px; font-size: 16px; border-radius: 6px; cursor: pointer;
            font-weight: bold; width: 100%; margin-top: 10px;
        }
        .result-box { margin-top: 20px; padding: 15px; background: #e9ecef; border-radius: 6px; display: none; }

        /* MODE UJIAN */
        #exam-mode { display: none; flex-direction: column; height: 100vh; width: 100vw; }
        .exam-header {
            background-color: var(--primary-blue); color: white; padding: 8px 15px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .exam-header img { height: 35px; background: white; border-radius: 50%; padding: 2px; }
        iframe { flex-grow: 1; border: none; width: 100%; background: white; }

        /* OVERLAY / LAYAR KUNCI */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98);
            display: none; justify-content: center; align-items: center; z-index: 9999;
            flex-direction: column; color: white; text-align: center; padding: 20px;
        }
        .overlay-box { background: white; color: black; padding: 30px; border-radius: 12px; width: 90%; max-width: 380px; }
        .status-badge { font-size: 10px; background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="generator-mode">
        <img src="logo.png" alt="Logo SDN Sukabumi 2" class="logo-img" onerror="this.src='https://via.placeholder.com/100?text=Logo'">
        <h2>Generator Ujian Aman</h2>
        <p>SDN Sukabumi 2 Kota Probolinggo</p>
        <input type="url" id="gformUrl" placeholder="Tempel Link Google Form di sini...">
        <button type="button" onclick="generateLink()">PROSES LINK UJIAN</button>
        <div id="resultArea" class="result-box">
            <input type="text" id="generatedLink" readonly>
            <button type="button" onclick="copyLink()" style="background-color: #28a745;">Salin Link</button>
        </div>
    </div>

    <div id="exam-mode">
        <div class="exam-header">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="logo.png" onerror="this.src='https://via.placeholder.com/35?text=S'">
                <div>
                    <div style="font-weight:bold; font-size:14px;">Asesmen SDN Sukabumi 2</div>
                    <span id="wake-status" class="status-badge">Menyiapkan...</span>
                </div>
            </div>
            <button type="button" onclick="requestExit()" style="width:auto; padding:5px 12px; background:var(--danger); font-size:12px;">Selesai</button>
        </div>
        <iframe id="form-frame" src=""></iframe>
    </div>

    <div id="cheat-overlay" class="overlay">
        <div class="overlay-box">
            <h2 style="color:var(--danger); margin-top:0;">AKSES TERKUNCI!</h2>
            <p>Terdeteksi aktivitas di luar aplikasi ujian.</p>
            <p style="font-size:14px; color:#555;">Minta guru pengawas untuk membuka kembali.</p>
            <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
            <input type="password" id="cheatPassword" placeholder="Password Guru">
            <button type="button" onclick="unlockExam()">BUKA KEMBALI</button>
        </div>
    </div>

    <div id="exit-overlay" class="overlay">
        <div class="overlay-box">
            <h3 style="color:var(--dark-blue);">Konfirmasi Selesai</h3>
            <p>Apakah Anda yakin ingin menyelesaikan ujian dan keluar?</p>
            <button type="button" onclick="confirmExit()" style="background-color: var(--danger);">Ya, Selesai</button>
            <button type="button" id="btnCancelExit" style="background:#6c757d; margin-top:10px;">Tidak, Batal</button>
        </div>
    </div>

    <script>
        // 1. Password diperbarui menjadi r4h4514
        const PASS = "r4h4514";
        let examActive = false;
        let isLocked = false;
        let protectionEnabled = false; 
        let unlockingInProgress = false; 
        let isRotating = false; 
        let wakeLock = null;
        let initialHeight = window.innerHeight;

        // ANTI SLEEP
        async function enableAntiSleep() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wake-status').innerText = "Anti-Sleep Aktif";
                } catch (err) {
                    document.getElementById('wake-status').innerText = "Layar Manual";
                }
            }
        }

        // FUNGSI KUNCI
        function lockNow() {
            if (examActive && protectionEnabled && !unlockingInProgress && !isLocked) {
                isLocked = true;
                localStorage.setItem('sukabumi2_locked', 'true');
                document.getElementById('cheat-overlay').style.display = 'flex';
                document.getElementById('form-frame').style.visibility = 'hidden';
            }
        }

        // FUNGSI UNLOCK
        function unlockExam() {
            const input = document.getElementById('cheatPassword').value.trim().toLowerCase();
            if (input === PASS) {
                unlockingInProgress = true; 
                isLocked = false;
                localStorage.removeItem('sukabumi2_locked');
                document.getElementById('cheat-overlay').style.display = 'none';
                document.getElementById('form-frame').style.visibility = 'visible';
                document.getElementById('cheatPassword').value = '';
                
                setTimeout(() => {
                    unlockingInProgress = false;
                    enableAntiSleep();
                    initialHeight = window.innerHeight; 
                }, 2000);
            } else {
                alert("Password Salah!");
            }
        }

        const urlParams = new URLSearchParams(window.location.search);
        const examUrl = urlParams.get('exam');

        if (examUrl) {
            document.getElementById('generator-mode').style.display = 'none';
            document.getElementById('exam-mode').style.display = 'flex';
            document.getElementById('form-frame').src = decodeURIComponent(examUrl);
            examActive = true;

            // 2. PERBAIKAN BUG BYPASS:
            // Logika pembersihan otomatis saat scan baru dihapus agar status lock tetap persisten.
            // Aplikasi hanya akan terbuka jika localStorage 'sukabumi2_locked' memang kosong/null.

            if (localStorage.getItem('sukabumi2_locked') === 'true') {
                protectionEnabled = true; // Langsung aktifkan proteksi jika status memang terkunci
                lockNow();
            } else {
                // TUNGGU 5 DETIK SEBELUM AKTIFKAN PROTEKSI SAAT PERTAMA KALI DIBUKA (NORMAL)
                setTimeout(() => {
                    protectionEnabled = true;
                    enableAntiSleep();
                    initialHeight = window.innerHeight;
                }, 5000);
            }

            // LISTENERS (Tetap dipertahankan)
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState !== 'visible') lockNow();
            });

            window.addEventListener('blur', () => {
                setTimeout(() => {
                    if (document.activeElement !== document.getElementById('form-frame')) {
                        lockNow();
                    }
                }, 1000);
            });

            window.addEventListener('orientationchange', () => {
                isRotating = true;
                setTimeout(() => {
                    initialHeight = window.innerHeight;
                    isRotating = false;
                }, 1000);
            });

            window.addEventListener('resize', () => {
                if (isRotating) return;
                const heightDiff = Math.abs(window.innerHeight - initialHeight);
                if (heightDiff > 100) { 
                    lockNow();
                }
            });
        }

        // FUNGSI GENERATOR
        function generateLink() {
            let url = document.getElementById('gformUrl').value;
            if (!url) return alert("Link kosong!");
            if(url.includes('/viewform')) url = url.split('?')[0] + '?embedded=true';
            const final = window.location.origin + window.location.pathname + "?exam=" + encodeURIComponent(url);
            document.getElementById('generatedLink').value = final;
            document.getElementById('resultArea').style.display = 'block';
        }
        
        function copyLink() {
            document.getElementById('generatedLink').select();
            document.execCommand("copy");
            alert("Link disalin!");
        }

        // EXIT (Konfirmasi Ya/Tidak tanpa password)
        function requestExit() {
            unlockingInProgress = true; 
            document.getElementById('exit-overlay').style.display = 'flex';
        }
        
        function confirmExit() {
            localStorage.removeItem('sukabumi2_locked');
            window.location.href = window.location.origin + window.location.pathname;
        }
        
        document.getElementById('btnCancelExit').onclick = function() {
            document.getElementById('exit-overlay').style.display = 'none';
            setTimeout(() => { unlockingInProgress = false; }, 1000);
        };
    </script>
</body>
</html>
